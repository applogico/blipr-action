name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release

      # When a release is cut, move the floating major/minor tags (v1, v1.2)
      # to the release commit so `uses: applogico/blipr-action@v1` always
      # resolves to the latest release — the convention for GitHub Actions.
      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.release_created }}
      - name: Update major and minor tags
        if: ${{ steps.release.outputs.release_created }}
        env:
          MAJOR: ${{ steps.release.outputs.major }}
          MINOR: ${{ steps.release.outputs.minor }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "v${MAJOR}"
          git tag -f "v${MAJOR}.${MINOR}"
          git push -f origin "v${MAJOR}"
          git push -f origin "v${MAJOR}.${MINOR}"
